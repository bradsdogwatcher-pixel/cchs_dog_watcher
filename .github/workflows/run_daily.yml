name: Daily PetHarbor Monitor and Email V2

on:
  workflow_dispatch: # Triggered externally or manually via a button on GitHub

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Allows the script to save the json data file back to the repo

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Script
      env:
        SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
        RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      run: python monitor.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        git add dog_history.json
        git add --ignore-unmatch DogImages/
        # Only commit if anything changed
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update dog history and image cache" && git push)
